name: Сборка на rustdesk-[техник].exe

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tech_username:
        description: "Потребителско име на техника"
        required: true
        default: "drazhev"
      tech_password:
        description: "Парола на техника"
        required: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Изтегляне на кода
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Инсталиране на PyInstaller
        run: pip install pyinstaller

      - name: Изтегляне на последния RustDesk
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "assets" | Out-Null
          $release = Invoke-RestMethod "https://api.github.com/repos/rustdesk/rustdesk/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x86_64\.exe$" } | Select-Object -First 1
          Write-Host "Изтеглям: $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "assets/rustdesk.exe"

      - name: Задаване на credentials
        shell: pwsh
        run: |
          $username = "${{ github.event.inputs.tech_username }}"
          $password = "${{ github.event.inputs.tech_password }}"
          if (-not $username) { $username = "drazhev" }
          (Get-Content src\launcher.py) `
            -replace 'TECH_USERNAME = ".*"', "TECH_USERNAME = `"$username`"" `
            -replace 'TECH_PASSWORD = ".*"', "TECH_PASSWORD = `"$password`"" |
            Set-Content src\launcher.py
          Write-Host "Техник: $username"

      - name: Сборка
        shell: pwsh
        run: |
          $username = "${{ github.event.inputs.tech_username }}"
          if (-not $username) { $username = "drazhev" }
          $exeName = "rustdesk-$username"
          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          $ws = "${{ github.workspace }}"
          pyinstaller `
            --onefile `
            --windowed `
            --name "$exeName" `
            --distpath "$ws\build" `
            --workpath "$ws\build\.pyinstaller-work" `
            --specpath "$ws\build" `
            --add-data "$ws\assets\rustdesk.exe;." `
            "$ws\src\launcher.py"

      - name: Качване като артефакт
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ github.event.inputs.tech_username || 'drazhev' }}
          path: build/rustdesk-${{ github.event.inputs.tech_username || 'drazhev' }}.exe
          retention-days: 30

      - name: Публикуване като Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "rustdesk-${{ github.event.inputs.tech_username || 'drazhev' }} (build ${{ github.run_number }})"
          files: build/rustdesk-${{ github.event.inputs.tech_username || 'drazhev' }}.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
